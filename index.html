<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực hành Thoát nạn - THPT Trần Suyền</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding-bottom: 50px; }
        .header { background: #003366; color: white; padding: 20px; border-bottom: 5px solid #ff9800; }
        h2 { margin: 0; font-size: 1.5em; text-transform: uppercase; }
        .mission { background: #fff3cd; color: #856404; padding: 12px; margin: 10px auto; width: 90%; border-radius: 8px; font-weight: bold; border: 1px solid #ffeeba; line-height: 1.4; }
        
        .map-box { position: relative; width: 95%; max-width: 1000px; margin: 15px auto; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; line-height: 0; border: 2px solid #ccc; }
        .map-layers img { width: 100%; display: none; pointer-events: none; }
        .map-layers img.active { display: block; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; touch-action: none; }
        
        .controls { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 18px; cursor: pointer; border-radius: 25px; border: 1px solid #003366; font-weight: bold; background: white; transition: 0.3s; }
        button.active { background: #003366 !important; color: white !important; }
        
        .btn-check { background: #28a745 !important; color: white !important; border: none; }
        .btn-clear { background: #dc3545 !important; color: white !important; border: none; }
        .btn-download { background: #007bff !important; color: white !important; border: none; }

        #result-msg { margin: 15px auto; padding: 15px; border-radius: 10px; display: none; font-size: 1.1em; font-weight: bold; max-width: 900px; line-height: 1.5; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>MÔ PHỎNG THOÁT NẠN LŨ LỤT TẠI PHÚ HÒA</h2>
</div>

<div class="mission">
    Nhiệm vụ: Hãy tìm các tuyến đường an toàn, khu vực an toàn, và vùng an toàn để di chuyển từ khu vực nguy cơ đến nơi an toàn (hoặc điểm tập kết cứu hộ).
</div>

<div class="controls">
    <button onclick="setLayer('GTHONG', this)" class="active">Giao thông</button>
    <button onclick="setLayer('MOHINHSODOCAO', this)">Độ cao địa hình</button>
    <button onclick="setLayer('CAP1', this)">Báo động 1</button>
    <button onclick="setLayer('CAP2', this)">Báo động 2</button>
    <button onclick="setLayer('CAP3', this)">Báo động 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa vẽ</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA ĐÚNG/SAI</button>
    <button class="btn-download" onclick="nopBai()">💾 NỘP BÀI (Lưu ảnh)</button>
</div>

<div class="map-box" id="capture-area">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-GTHONG" class="active">
        <img src="MOHINHSODOCAO.png" id="img-MOHINHSODOCAO">
        <img src="CAP1.png" id="img-CAP1">
        <img src="CAP2.png" id="img-CAP2">
        <img src="CAP3.png" id="img-CAP3">
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('capture-area');
    let drawing = false;
    let endX, endY;
    let currentLevel = 'GTHONG';

    function resize() {
        const activeImg = document.querySelector('.map-layers img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    
    window.onload = () => setTimeout(resize, 600);
    window.onresize = resize;

    function setLayer(id, btn) {
        currentLevel = id;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

        document.querySelectorAll('.map-layers img').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        resize();
        ctx.drawImage(tempCanvas, 0, 0);
        document.getElementById('result-msg').style.display = 'none';
    }

    // Logic vẽ (Chuột & Cảm ứng)
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 4; ctx.strokeStyle = '#ff0000'; ctx.lineCap = 'round';
        ctx.lineTo(pos.x, pos.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        endX = pos.x; endY = pos.y;
    });
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        endX = pos.x; endY = pos.y;
    });

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result-msg').style.display = 'none';
        endX = null;
    }

    function checkResult() {
        const msg = document.getElementById('result-msg');
        if (!endX) { alert("Em hãy vẽ lộ trình di chuyển trên bản đồ!"); return; }

        const pX = endX / canvas.width;
        const pY = endY / canvas.height;

        // Tọa độ Trường THPT Trần Suyền (Điểm tập kết cứu hộ chính)
        const isTranSuyen = (pX > 0.37 && pX < 0.43 && pY > 0.37 && pY < 0.47);
        // Các khu vực cao phía trên (Chùa Hương Sơn, Trạm y tế Hòa Kiến)
        const isVungCaoNgoai = (pY < 0.32); 

        let logicDung = false;

        if (currentLevel === 'CAP1') {
            // Cấp 1: Có thể di chuyển đến trường hoặc các vùng cao lân cận
            if (isTranSuyen || isVungCaoNgoai) logicDung = true;
        } 
        else if (currentLevel === 'CAP2' || currentLevel === 'CAP3') {
            // Cấp 2 & 3: Ưu tiên tập kết tại Trường để đợi cứu hộ (phương án an toàn nhất khi nước dâng cao)
            if (isTranSuyen) logicDung = true;
        } 
        else {
            if (isTranSuyen || isVungCaoNgoai) logicDung = true;
        }

        if (logicDung) {
            msg.innerHTML = "🎉 Chúc mừng em, em đã tìm được đúng tuyến đường thoát nạn!";
            msg.className = "success";
        } else {
            msg.innerHTML = "⚠️ Tuyến đường này có vẻ nước đang lên không thể di chuyển được, em hãy xác định
