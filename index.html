<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thực hành Thoát nạn - THPT Trần Suyền</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Tối ưu hóa hiển thị di động */
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding-bottom: 30px; touch-action: manipulation; }
        .header { background: #003366; color: white; padding: 15px; border-bottom: 4px solid #ff9800; }
        h2 { margin: 0; font-size: 1.3em; text-transform: uppercase; }
        .mission { background: #fff3cd; color: #856404; padding: 10px; margin: 5px auto; width: 95%; border-radius: 8px; font-size: 0.9em; border: 1px solid #ffeeba; }
        
        /* Khung bản đồ */
        .map-box { position: relative; width: 98%; max-width: 1000px; margin: 10px auto; background: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; line-height: 0; border: 1px solid #ccc; }
        .map-layers img { width: 100%; display: none; pointer-events: none; }
        .map-layers img.active { display: block; }
        
        /* Canvas vẽ - Quan trọng: touch-action: none để không bị cuộn trang khi vẽ */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; touch-action: none; }
        
        /* Nút bấm to hơn cho ngón tay */
        .controls { margin: 10px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        button { padding: 10px 12px; cursor: pointer; border-radius: 15px; border: 1px solid #003366; font-weight: bold; background: white; font-size: 0.85em; }
        button.active { background: #003366 !important; color: white !important; }
        
        .btn-check { background: #28a745 !important; color: white !important; border: none; }
        .btn-clear { background: #dc3545 !important; color: white !important; border: none; }
        .btn-download { background: #007bff !important; color: white !important; border: none; }

        #result-msg { margin: 10px auto; padding: 12px; border-radius: 8px; display: none; font-size: 1em; font-weight: bold; width: 90%; line-height: 1.4; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>MÔ PHỎNG THOÁT NẠN PHÚ HÒA</h2>
</div>

<div class="mission">
    <b>Nhiệm vụ:</b> Di chuyển từ khu vực nguy cơ đến nơi an toàn. 
    <br>(Cấp 1: BV Phú Hòa, Đền thờ Lương Văn Chánh, Trường. Cấp 2-3: Ưu tiên Trường).
</div>

<div class="controls">
    <button onclick="setLayer('GTHONG', this)" class="active">Giao thông</button>
    <button onclick="setLayer('MOHINHSODOCAO', this)">Địa hình</button>
    <button onclick="setLayer('CAP1', this)">Cấp 1</button>
    <button onclick="setLayer('CAP2', this)">Cấp 2</button>
    <button onclick="setLayer('CAP3', this)">Cấp 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA</button>
    <button class="btn-download" onclick="nopBai()">💾 NỘP BÀI</button>
</div>

<div class="map-box" id="capture-area">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-GTHONG" class="active">
        <img src="MOHINHSODOCAO.png" id="img-MOHINHSODOCAO">
        <img src="CAP1.png" id="img-CAP1">
        <img src="CAP2.png" id="img-CAP2">
        <img src="CAP3.png" id="img-CAP3">
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('capture-area');
    let drawing = false;
    let endX, endY;
    let currentLevel = 'GTHONG';

    // Hàm lấy kích thước chuẩn của ảnh đang hiển thị
    function resize() {
        const activeImg = document.querySelector('.map-layers img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    
    window.onload = () => setTimeout(resize, 800);
    window.onresize = resize;

    function setLayer(id, btn) {
        currentLevel = id;
        const temp = ctx.getImageData(0,0, canvas.width, canvas.height);
        document.querySelectorAll('.map-layers img').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        resize();
        ctx.putImageData(temp, 0, 0);
        document.getElementById('result-msg').style.display = 'none';
    }

    // Lấy tọa độ chuẩn xác trên cả điện thoại và máy tính
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches[0]) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDraw(e) {
        drawing = true;
        ctx.beginPath();
        const pos = getPos(e);
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault(); // Chặn cuộn trang
    }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#ff0000';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        endX = pos.x;
        endY = pos.y;
        e.preventDefault();
    }

    function stopDraw() { drawing = false; }

    // Sự kiện chuột
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDraw);

    // Sự kiện cảm ứng điện thoại
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result-msg').style.display = 'none';
        endX = null;
    }

    function checkResult() {
        const msg = document.getElementById('result-msg');
        if (!endX) { alert("Em hãy vẽ tuyến đường trên bản đồ!"); return; }

        const pX = endX / canvas.width;
        const pY = endY / canvas.height;

        const isTranSuyen = (pX > 0.37 && pX < 0.43 && pY > 0.37 && pY < 0.47);
        const isBVPhoHoa = (pX > 0.45 && pX < 0.55 && pY > 0.25 && pY < 0.35);
        const isDenTho = (pX > 0.65 && pX < 0.8 && pY > 0.4 && pY < 0.6);

        let logicDung = (currentLevel === 'CAP1') ? (isTranSuyen || isBVPhoHoa || isDenTho) : isTranSuyen;

        if (logicDung) {
            msg.innerHTML = "🎉 Chúc mừng em, em đã tìm được đúng tuyến đường thoát nạn!";
            msg.className = "success";
        } else {
            msg.innerHTML = "⚠️ Tuyến đường này có vẻ nước đang lên không thể di chuyển được, em hãy xác định lại nhé.";
            msg.className = "fail";
        }
        msg.style.display = "block";
    }

    function nopBai() {
        html2canvas(document.getElementById('capture-area'), { useCORS: true }).then(canvasRes => {
            const link = document.createElement('a');
            link.download = 'BaiLam_ThoatNan.png';
            link.href = canvasRes.toDataURL();
            link.click();
            alert("Đã lưu ảnh bài làm vào thư viện ảnh/tải về của điện thoại!");
        });
    }
</script>
</body>
</html>
