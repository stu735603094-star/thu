<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thực hành Thoát nạn - THPT Trần Suyền</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f0f4f8; margin: 0; }
        .header { background: #003366; color: white; padding: 15px; border-bottom: 5px solid #ff9800; }
        .map-box { position: relative; width: 95%; max-width: 1000px; margin: 15px auto; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; line-height: 0; }
        
        /* Chồng các lớp ảnh */
        .map-layers img { width: 100%; display: none; pointer-events: none; }
        .map-layers img.active { display: block; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; touch-action: none; }
        
        .controls { margin: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 20px; border: 1px solid #003366; font-weight: bold; background: white; transition: 0.2s; }
        button.active { background: #003366; color: white; }
        .btn-check { background: #28a745; color: white; border: none; }
        .btn-clear { background: #dc3545; color: white; border: none; }
        
        #result-msg { margin: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 1.1em; font-weight: bold; max-width: 800px; margin-left: auto; margin-right: auto; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; display: block !important; }
        .fail { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>

<div class="header">
    <h2>BÀI TẬP: THIẾT KẾ ĐƯỜNG THOÁT LŨ TẠI PHÚ HÒA</h2>
    <p>Điểm đến an toàn: Chùa Hương Sơn (biểu tượng 🔴) hoặc Trạm y tế xã Hòa Kiến (biểu tượng ✚)</p>
</div>

<div class="controls">
    <button onclick="setLayer('GTHONG', this)" class="active">Giao thông</button>
    <button onclick="setLayer('MOHINHSODOCAO', this)">Độ cao địa hình</button>
    <button onclick="setLayer('CAP1', this)">Báo động 1</button>
    <button onclick="setLayer('CAP2', this)">Báo động 2</button>
    <button onclick="setLayer('CAP3', this)">Báo động 3</button>
    <button class="btn-clear" onclick="clearCanvas()">🧹 Xóa đường vẽ</button>
    <button class="btn-check" onclick="checkResult()">✅ KIỂM TRA ĐÚNG/SAI</button>
</div>

<div class="map-box" id="container">
    <div class="map-layers">
        <img src="GTHONG.png" id="img-GTHONG" class="active">
        <img src="MOHINHSODOCAO.png" id="img-MOHINHSODOCAO">
        <img src="CAP1.png" id="img-CAP1">
        <img src="CAP2.png" id="img-CAP2">
        <img src="CAP3.png" id="img-CAP3">
    </div>
    <canvas id="canvas"></canvas>
</div>

<div id="result-msg"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');
    let drawing = false;
    let endX, endY;

    function resize() {
        const activeImg = document.querySelector('.map-layers img.active');
        canvas.width = container.offsetWidth;
        canvas.height = activeImg.offsetHeight;
    }
    
    window.onload = () => setTimeout(resize, 500);
    window.onresize = resize;

    function setLayer(id, btn) {
        document.querySelectorAll('.map-layers img').forEach(img => img.classList.remove('active'));
        document.getElementById('img-' + id).classList.add('active');
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Lưu lại nét vẽ khi đổi lớp
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
        
        resize();
        ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
    }

    // Xử lý vẽ cảm ứng và chuột
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDraw(e) { drawing = true; ctx.beginPath(); draw(e); }
    function stopDraw() { drawing = false; }
    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 4; ctx.strokeStyle = '#e91e63'; ctx.lineCap = 'round';
        ctx.lineTo(pos.x, pos.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        endX = pos.x; endY = pos.y;
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDraw);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result-msg').style.display = 'none';
        endX = null;
    }

    function checkResult() {
        const msg = document.getElementById('result-msg');
        if (!endX) { alert("Em hãy vẽ đường đi từ trường THPT Trần Suyền đến đích trước nhé!"); return; }

        const pX = endX / canvas.width;
        const pY = endY / canvas.height;

        // Tọa độ dựa trên vị trí biểu tượng trên bản đồ của bạn
        // Chùa Hương Sơn (Khoảng giữa bên trái)
        const isChuaHS = (pX > 0.25 && pX < 0.35 && pY > 0.15 && pY < 0.25);
        // Trạm y tế xã Hòa Kiến (Phía trên chính giữa)
        const isTramYT = (pX > 0.35 && pX < 0.45 && pY > 0.1 && pY < 0.2);

        if (isChuaHS || isTramYT) {
            let dich = isChuaHS ? "Chùa Hương Sơn" : "Trạm y tế xã Hòa Kiến";
            msg.innerHTML = "✅ XUẤT SẮC! Em đã chọn đúng lộ trình an toàn đến " + dich + ". Đây là khu vực cao, không bị ngập ở cấp độ 3.";
            msg.className = "success";
        } else {
            msg.innerHTML = "❌ CHƯA CHÍNH XÁC: Điểm đến này vẫn nằm trong vùng nguy cơ ngập cao hoặc chưa phải trạm cứu hộ an toàn nhất. Em hãy quan sát kỹ lớp 'Độ cao địa hình' và 'Báo động 3' để chọn lại nhé!";
            msg.className = "fail";
        }
        msg.style.display = "block";
    }
</script>

</body>
</html>
